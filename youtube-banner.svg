<svg viewBox="0 0 2560 1440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="50%"><stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.1"/><stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/></radialGradient>
    <radialGradient id="glow2" cx="70%" cy="40%"><stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.08"/><stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/></radialGradient>
  </defs>

  <!-- Background -->
  <rect width="2560" height="1440" fill="#0a0e17"/>
  <rect width="2560" height="1440" fill="url(#glow1)"/>
  <rect width="2560" height="1440" fill="url(#glow2)"/>

  <!-- Grid -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="360" x2="2560" y2="360"/>
    <line x1="0" y1="720" x2="2560" y2="720"/>
    <line x1="0" y1="1080" x2="2560" y2="1080"/>
    <line x1="640" y1="0" x2="640" y2="1440"/>
    <line x1="1280" y1="0" x2="1280" y2="1440"/>
    <line x1="1920" y1="0" x2="1920" y2="1440"/>
  </g>

  <!-- Circuit decorations -->
  <g opacity="0.2">
    <circle cx="200" cy="300" r="6" fill="#00d4ff"/><circle cx="280" cy="380" r="4" fill="#a855f7"/><line x1="200" y1="300" x2="280" y2="380" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="150" cy="500" r="5" fill="#00ff88"/><line x1="280" y1="380" x2="150" y2="500" stroke="#a855f7" stroke-width="1"/>
    <circle cx="2350" cy="350" r="6" fill="#a855f7"/><circle cx="2400" cy="450" r="4" fill="#00d4ff"/><line x1="2350" y1="350" x2="2400" y2="450" stroke="#a855f7" stroke-width="1"/>
    <circle cx="2300" cy="550" r="5" fill="#00ff88"/><line x1="2400" y1="450" x2="2300" y2="550" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="300" cy="900" r="4" fill="#00d4ff" opacity="0.5"/>
    <circle cx="2250" cy="950" r="4" fill="#a855f7" opacity="0.5"/>
  </g>

  <!-- ===== SAFE ZONE CONTENT (centered for all devices) ===== -->
  <!-- YouTube safe zone: roughly 1546x423 centered -->

  <!-- Crown + Terminal icon -->
  <g transform="translate(750, 420)">
    <rect x="0" y="60" width="160" height="110" rx="12" fill="none" stroke="url(#g1)" stroke-width="3.5"/>
    <rect x="0" y="60" width="160" height="30" rx="12" fill="url(#g1)" opacity="0.15"/>
    <circle cx="22" cy="75" r="5" fill="#ef4444"/>
    <circle cx="40" cy="75" r="5" fill="#f97316"/>
    <circle cx="58" cy="75" r="5" fill="#00ff88"/>
    <text x="22" y="120" font-family="monospace" font-size="20" fill="#00d4ff">$</text>
    <text x="42" y="120" font-family="monospace" font-size="20" fill="#e2e8f0">deploy</text>
    <text x="22" y="150" font-family="monospace" font-size="17" fill="#00ff88">✓ kingdom</text>
    <g transform="translate(80, 10)">
      <polygon points="0,48 -38,48 -25,18 -13,38 0,2 13,38 25,18 38,48" fill="url(#g1)" opacity="0.9"/>
      <circle cx="-25" cy="15" r="5" fill="#00d4ff"/>
      <circle cx="0" cy="0" r="6" fill="#a855f7"/>
      <circle cx="25" cy="15" r="5" fill="#00d4ff"/>
    </g>
  </g>

  <!-- Main text -->
  <g transform="translate(970, 470)">
    <text font-family="Inter, Arial, sans-serif" font-size="90" font-weight="800" fill="#e2e8f0">DevOps AI</text>
    <text y="100" font-family="Inter, Arial, sans-serif" font-size="90" font-weight="800" fill="url(#g1)">Kingdom</text>
    <text y="150" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#64748b" letter-spacing="5">SECURE · SCALE · AUTOMATE</text>
  </g>

  <!-- Skill tags -->
  <g transform="translate(830, 780)">
    <rect x="0" y="0" width="150" height="42" rx="8" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.25)" stroke-width="1.5"/>
    <text x="75" y="28" font-family="Inter, Arial, sans-serif" font-size="17" fill="#00d4ff" text-anchor="middle" font-weight="600">Kubernetes</text>
    <rect x="170" y="0" width="140" height="42" rx="8" fill="rgba(0,255,136,0.1)" stroke="rgba(0,255,136,0.25)" stroke-width="1.5"/>
    <text x="240" y="28" font-family="Inter, Arial, sans-serif" font-size="17" fill="#00ff88" text-anchor="middle" font-weight="600">DevSecOps</text>
    <rect x="330" y="0" width="100" height="42" rx="8" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.25)" stroke-width="1.5"/>
    <text x="380" y="28" font-family="Inter, Arial, sans-serif" font-size="17" fill="#a855f7" text-anchor="middle" font-weight="600">AI / ML</text>
    <rect x="450" y="0" width="130" height="42" rx="8" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.25)" stroke-width="1.5"/>
    <text x="515" y="28" font-family="Inter, Arial, sans-serif" font-size="17" fill="#f97316" text-anchor="middle" font-weight="600">Terraform</text>
    <rect x="600" y="0" width="90" height="42" rx="8" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.25)" stroke-width="1.5"/>
    <text x="645" y="28" font-family="Inter, Arial, sans-serif" font-size="17" fill="#00d4ff" text-anchor="middle" font-weight="600">AWS</text>
  </g>

  <!-- Top/bottom accent lines -->
  <rect x="0" y="0" width="2560" height="6" fill="url(#g1)" opacity="0.5"/>
  <rect x="0" y="1434" width="2560" height="6" fill="url(#g1)" opacity="0.5"/>
</svg>
