<svg viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="50%"><stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.08"/><stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/></radialGradient>
    <radialGradient id="glow2" cx="80%" cy="30%"><stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.06"/><stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/></radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#0a0e17"/>
  <rect width="1584" height="396" fill="url(#glow1)"/>
  <rect width="1584" height="396" fill="url(#glow2)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="100" x2="1584" y2="100"/>
    <line x1="0" y1="200" x2="1584" y2="200"/>
    <line x1="0" y1="300" x2="1584" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="396"/>
    <line x1="800" y1="0" x2="800" y2="396"/>
    <line x1="1200" y1="0" x2="1200" y2="396"/>
  </g>

  <!-- Circuit decoration left -->
  <g opacity="0.3">
    <circle cx="80" cy="80" r="4" fill="#00d4ff"/>
    <circle cx="120" cy="120" r="3" fill="#a855f7"/>
    <circle cx="60" cy="160" r="3" fill="#00ff88"/>
    <line x1="80" y1="80" x2="120" y2="120" stroke="#00d4ff" stroke-width="1"/>
    <line x1="120" y1="120" x2="60" y2="160" stroke="#a855f7" stroke-width="1"/>
    <circle cx="160" cy="300" r="5" fill="#00d4ff" opacity="0.5"/>
    <circle cx="200" cy="340" r="3" fill="#a855f7" opacity="0.4"/>
    <line x1="160" y1="300" x2="200" y2="340" stroke="#1e293b" stroke-width="1"/>
  </g>

  <!-- Circuit decoration right -->
  <g opacity="0.3">
    <circle cx="1400" cy="100" r="4" fill="#a855f7"/>
    <circle cx="1450" cy="150" r="3" fill="#00d4ff"/>
    <circle cx="1380" cy="200" r="3" fill="#00ff88"/>
    <line x1="1400" y1="100" x2="1450" y2="150" stroke="#a855f7" stroke-width="1"/>
    <line x1="1450" y1="150" x2="1380" y2="200" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="1500" cy="280" r="5" fill="#00ff88" opacity="0.4"/>
    <circle cx="1460" cy="320" r="3" fill="#00d4ff" opacity="0.3"/>
    <line x1="1500" y1="280" x2="1460" y2="320" stroke="#1e293b" stroke-width="1"/>
  </g>

  <!-- Crown + Terminal icon -->
  <g transform="translate(350, 80)">
    <rect x="0" y="50" width="130" height="90" rx="10" fill="none" stroke="url(#g1)" stroke-width="3"/>
    <rect x="0" y="50" width="130" height="26" rx="10" fill="url(#g1)" opacity="0.15"/>
    <circle cx="18" cy="63" r="4.5" fill="#ef4444"/>
    <circle cx="34" cy="63" r="4.5" fill="#f97316"/>
    <circle cx="50" cy="63" r="4.5" fill="#00ff88"/>
    <text x="18" y="100" font-family="monospace" font-size="16" fill="#00d4ff">$</text>
    <text x="36" y="100" font-family="monospace" font-size="16" fill="#e2e8f0">deploy</text>
    <text x="18" y="125" font-family="monospace" font-size="14" fill="#00ff88">✓ kingdom</text>
    <g transform="translate(65, 10)">
      <polygon points="0,38 -30,38 -20,14 -10,30 0,2 10,30 20,14 30,38" fill="url(#g1)" opacity="0.9"/>
      <circle cx="-20" cy="12" r="4" fill="#00d4ff"/>
      <circle cx="0" cy="0" r="5" fill="#a855f7"/>
      <circle cx="20" cy="12" r="4" fill="#00d4ff"/>
    </g>
  </g>

  <!-- Main text -->
  <g transform="translate(530, 110)">
    <text font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" fill="#e2e8f0">DevOps AI</text>
    <text y="70" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" fill="url(#g1)">Kingdom</text>
    <text y="110" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#64748b" letter-spacing="4">SECURE · SCALE · AUTOMATE</text>
  </g>

  <!-- Skill tags bottom -->
  <g transform="translate(530, 310)">
    <rect x="0" y="0" width="120" height="32" rx="6" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <text x="60" y="21" font-family="Inter, Arial, sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle" font-weight="600">Kubernetes</text>

    <rect x="135" y="0" width="100" height="32" rx="6" fill="rgba(0,255,136,0.1)" stroke="rgba(0,255,136,0.2)" stroke-width="1"/>
    <text x="185" y="21" font-family="Inter, Arial, sans-serif" font-size="13" fill="#00ff88" text-anchor="middle" font-weight="600">DevSecOps</text>

    <rect x="250" y="0" width="80" height="32" rx="6" fill="rgba(168,85,247,0.1)" stroke="rgba(168,85,247,0.2)" stroke-width="1"/>
    <text x="290" y="21" font-family="Inter, Arial, sans-serif" font-size="13" fill="#a855f7" text-anchor="middle" font-weight="600">AI / ML</text>

    <rect x="345" y="0" width="100" height="32" rx="6" fill="rgba(249,115,22,0.1)" stroke="rgba(249,115,22,0.2)" stroke-width="1"/>
    <text x="395" y="21" font-family="Inter, Arial, sans-serif" font-size="13" fill="#f97316" text-anchor="middle" font-weight="600">Terraform</text>

    <rect x="460" y="0" width="70" height="32" rx="6" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <text x="495" y="21" font-family="Inter, Arial, sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle" font-weight="600">AWS</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="390" width="1584" height="6" fill="url(#g1)" opacity="0.6"/>
</svg>
